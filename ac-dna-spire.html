<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assassin's Creed II — DNA Memory Browser</title>
<style>
  /* ---------------------------------------------------------------
     Theme tokens. Manual [data-theme] overrides win over the OS
     media query via higher specificity (:root[data-theme] = 0,2,0
     vs :root inside @media = 0,1,0).
  ---------------------------------------------------------------- */
  :root {
    --ground:#e8e7e4; --ground-hi:#f4f3f1; --ink:#3a3833; --ink-soft:#8d897f;
    --plate:rgba(84,80,72,.80); --plate-2:rgba(70,66,59,.87); --plate-ink:#f2f1ee;
    --plate-dim:rgba(242,241,238,.62);
    --blood:#c0281c; --blood-deep:#7a1004; --blood-hot:#d94a2a;
    --line:rgba(0,0,0,.16); --line-soft:rgba(0,0,0,.09);
    --key-bg:rgba(84,80,72,.90); --key-ink:#f2f1ee; --key-border:rgba(255,255,255,.28);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --ground:#17181a; --ground-hi:#101113; --ink:#d9d8d4; --ink-soft:#93908a;
      --plate:rgba(28,28,31,.82); --plate-2:rgba(20,20,23,.88); --plate-ink:#f2f1ee;
      --plate-dim:rgba(242,241,238,.58);
      --blood:#d9382a; --blood-deep:#8f1607; --blood-hot:#ea5a34;
      --line:rgba(255,255,255,.16); --line-soft:rgba(255,255,255,.08);
      --key-bg:rgba(28,28,31,.92); --key-ink:#f2f1ee; --key-border:rgba(255,255,255,.22);
    }
  }
  :root[data-theme="dark"] {
    --ground:#17181a; --ground-hi:#101113; --ink:#d9d8d4; --ink-soft:#93908a;
    --plate:rgba(28,28,31,.92); --plate-2:rgba(20,20,23,.95); --plate-ink:#f2f1ee;
    --plate-dim:rgba(242,241,238,.58);
    --blood:#d9382a; --blood-deep:#8f1607; --blood-hot:#ea5a34;
    --line:rgba(255,255,255,.16); --line-soft:rgba(255,255,255,.08);
    --key-bg:rgba(28,28,31,.92); --key-ink:#f2f1ee; --key-border:rgba(255,255,255,.22);
  }
  :root[data-theme="light"] {
    --ground:#e8e7e4; --ground-hi:#f4f3f1; --ink:#3a3833; --ink-soft:#8d897f;
    --plate:rgba(84,80,72,.80); --plate-2:rgba(70,66,59,.87); --plate-ink:#f2f1ee;
    --plate-dim:rgba(242,241,238,.62);
    --blood:#c0281c; --blood-deep:#7a1004; --blood-hot:#d94a2a;
    --line:rgba(0,0,0,.16); --line-soft:rgba(0,0,0,.09);
    --key-bg:rgba(84,80,72,.90); --key-ink:#f2f1ee; --key-border:rgba(255,255,255,.28);
  }

  :root { --panel-w: 336px; }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    overflow: hidden; background: var(--ground);
    font-family: "Arial Narrow","Helvetica Neue","Segoe UI",system-ui,sans-serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  body { position: fixed; inset: 0; }

  .uppercase {
    text-transform: uppercase; letter-spacing: .1em;
    font-stretch: condensed;
  }
  .tnum { font-variant-numeric: tabular-nums; }

  /* ---- canvas stage ---- */
  #stage { position: fixed; inset: 0; z-index: 0; }
  canvas#spireCanvas { display: block; width: 100%; height: 100%; }

  /* floating diamond marker over the active clump */
  #markerLayer { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
  .marker {
    position: absolute; width: 11px; height: 11px; margin: -6px 0 0 -6px;
    transform: rotate(45deg); background: var(--blood-hot);
    box-shadow: 0 0 10px rgba(217,74,42,.75); opacity: 0;
    transition: opacity .25s;
  }
  .marker .stem {
    position: absolute; left: 50%; top: 100%; width: 1px; height: 30px;
    background: linear-gradient(to bottom, var(--blood-hot), transparent);
    transform: translateX(-50%) rotate(-45deg); transform-origin: top center;
  }

  /* year / subject float annotation */
  #annotation {
    position: fixed; z-index: 1; pointer-events: none;
    font-size: 12px; color: var(--ink-soft);
    text-shadow: 0 1px 3px rgba(0,0,0,.25);
    opacity: 0; transition: opacity .3s;
  }

  /* ---- side panel ---- */
  .panel {
    position: fixed; z-index: 3; top: 0; left: 0; bottom: 0;
    width: var(--panel-w); max-width: 100%;
    display: flex; flex-direction: column;
    background: linear-gradient(180deg, var(--plate-2), var(--plate));
    backdrop-filter: blur(7px); -webkit-backdrop-filter: blur(7px);
    border-right: 1px solid var(--line);
    color: var(--plate-ink);
    box-shadow: 6px 0 30px rgba(0,0,0,.22);
    transition: transform .34s cubic-bezier(.4,0,.2,1);
  }
  :root.panel-collapsed .panel { transform: translateX(-100%); }

  /* persistent handle tab — always reachable, slides with the collapse state,
     lets the spire read as the hero by default (matches the AC reference,
     where the browser is a thin corner overlay, not a boxed sidebar) */
  .panel-handle {
    position: fixed; z-index: 4; bottom: 96px; left: var(--panel-w);
    width: 30px; height: 96px;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    background: linear-gradient(180deg, var(--plate-2), var(--plate));
    border: 1px solid var(--line); border-left: none; border-radius: 0 8px 8px 0;
    color: var(--plate-ink); cursor: pointer; font-family: inherit;
    writing-mode: vertical-rl; text-transform: uppercase; letter-spacing: .16em;
    font-size: 11px; font-weight: 700;
    box-shadow: 4px 0 16px rgba(0,0,0,.2);
    transition: left .34s cubic-bezier(.4,0,.2,1);
  }
  .panel-handle:hover { background: linear-gradient(180deg, var(--plate-2), var(--plate-2)); }
  .panel-handle .chev { writing-mode: horizontal-tb; transition: transform .34s ease; }
  :root.panel-collapsed .panel-handle { left: 0; }
  :root.panel-collapsed .panel-handle .chev { transform: rotate(180deg); }
  .panel__head {
    padding: 16px 18px 12px; border-bottom: 1px solid rgba(255,255,255,.10);
    flex: 0 0 auto;
  }
  .brandrow { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; }
  .wordmark {
    font-size: 22px; font-weight: 700; letter-spacing: .34em;
    color: var(--plate-ink); text-transform: uppercase; font-stretch: condensed;
  }
  .subject {
    margin-top: 3px; font-size: 12px; letter-spacing: .18em;
    color: var(--plate-dim); text-transform: uppercase;
  }
  .subject b { color: var(--blood-hot); font-weight: 700; }

  .iconbtn {
    font-family: inherit; cursor: pointer; color: var(--plate-ink);
    background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.22);
    border-radius: 3px; font-size: 10px; letter-spacing: .1em; padding: 6px 9px;
    text-transform: uppercase; white-space: nowrap; line-height: 1;
  }
  .iconbtn:hover { background: rgba(255,255,255,.13); }

  .searchwrap { padding: 12px 18px 10px; flex: 0 0 auto; }
  .searchbox { position: relative; }
  .searchbox svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 15px; height: 15px; opacity: .55; pointer-events: none; }
  #search {
    width: 100%; font-family: inherit; font-size: 14px;
    padding: 10px 12px 10px 32px; border-radius: 4px;
    background: rgba(0,0,0,.28); color: var(--plate-ink);
    border: 1px solid rgba(255,255,255,.18); letter-spacing: .04em;
  }
  #search::placeholder { color: rgba(242,241,238,.5); letter-spacing: .06em; }
  .searchmeta {
    margin-top: 7px; font-size: 11px; letter-spacing: .12em;
    color: var(--plate-dim); text-transform: uppercase;
    display: flex; justify-content: space-between; align-items: center; gap: 8px;
  }
  .searchmeta .clearbtn {
    font-family: inherit; background: none; border: none; cursor: pointer;
    color: var(--blood-hot); letter-spacing: .1em; text-transform: uppercase;
    font-size: 11px; padding: 0; visibility: hidden;
  }
  .searchmeta .clearbtn.show { visibility: visible; }

  /* ---- accordion list ---- */
  .seqlist {
    flex: 1 1 auto; overflow-y: auto; overflow-x: hidden;
    padding: 4px 10px 72px; overscroll-behavior: contain;
  }
  .seqlist::-webkit-scrollbar { width: 9px; }
  .seqlist::-webkit-scrollbar-thumb { background: rgba(255,255,255,.16); border-radius: 6px; }

  .seq { border-bottom: 1px solid rgba(255,255,255,.08); }
  .seq.hidden { display: none; }
  .seq-header {
    width: 100%; text-align: left; font-family: inherit; cursor: pointer;
    background: none; border: none; color: var(--plate-ink);
    padding: 12px 8px 12px 10px; display: grid;
    grid-template-columns: 16px 28px 1fr auto; align-items: center; gap: 10px;
  }
  .seq-header:hover { background: rgba(255,255,255,.05); }
  .seq-num {
    font-size: 11px; letter-spacing: .05em; color: var(--plate-dim);
    font-variant-numeric: tabular-nums; text-align: center;
  }
  /* procedurally generated seal — a stand-in for per-sequence artwork we
     can't source (no external requests are permitted in this sandbox) */
  .seq-seal { width: 28px; height: 28px; flex: 0 0 auto; color: var(--blood-hot); opacity: .75; }
  .seq-header[aria-expanded="true"] .seq-seal { opacity: 1; }
  .seq-seal svg { display: block; width: 100%; height: 100%; }
  .seq-titlewrap { min-width: 0; }
  .seq-eyebrow {
    font-size: 9.5px; letter-spacing: .16em; color: var(--blood-hot);
    text-transform: uppercase; margin-bottom: 2px; font-weight: 700;
  }
  .seq-title {
    font-size: 14px; letter-spacing: .05em; text-transform: uppercase;
    font-stretch: condensed; line-height: 1.15;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .seq-year {
    font-size: 12px; color: var(--plate-dim); letter-spacing: .06em;
    font-variant-numeric: tabular-nums; text-align: right;
  }
  .chev { transition: transform .2s; opacity: .7; }
  .seq-header[aria-expanded="true"] .chev { transform: rotate(90deg); }
  .seq-header[aria-expanded="true"] .seq-title { color: #fff; }

  mark {
    background: rgba(217,74,42,.34); color: inherit; border-radius: 2px;
    padding: 0 1px; box-shadow: inset 0 -1px 0 rgba(217,74,42,.6);
  }

  .seq-region { padding: 0 4px 8px 8px; }
  .seq-region[hidden] { display: none; }
  .mem-row {
    width: 100%; text-align: left; font-family: inherit; cursor: pointer;
    background: rgba(0,0,0,.16); border: 1px solid transparent;
    border-left: 2px solid rgba(255,255,255,.14);
    color: var(--plate-ink); padding: 8px 10px; margin: 4px 0 4px 26px;
    border-radius: 0 4px 4px 0; display: block; width: calc(100% - 26px);
  }
  .mem-row.hidden { display: none; }
  .mem-row:hover { background: rgba(0,0,0,.28); border-left-color: var(--blood-hot); }
  .mem-row.active { border-left-color: var(--blood-hot); background: rgba(122,16,4,.30); }
  .mem-row .m-top { display: flex; justify-content: space-between; gap: 8px; align-items: baseline; }
  .mem-row .m-title {
    font-size: 12.5px; letter-spacing: .05em; text-transform: uppercase;
    font-stretch: condensed; line-height: 1.2;
  }
  .mem-row .m-num { font-size: 10px; color: var(--plate-dim); letter-spacing: .1em; font-variant-numeric: tabular-nums; white-space: nowrap; }
  .mem-row .m-sub {
    margin-top: 3px; font-size: 10.5px; letter-spacing: .1em; text-transform: uppercase;
    color: var(--plate-dim);
  }

  .emptystate {
    padding: 30px 18px; text-align: center; color: var(--plate-dim);
    font-size: 12px; letter-spacing: .1em; text-transform: uppercase; display: none;
  }
  .emptystate.show { display: block; }

  /* ---- memory detail overlay plate ---- */
  .detail {
    position: fixed; z-index: 4; left: 0; right: 0; top: 0; bottom: 64px;
    display: none; align-items: center; justify-content: center; pointer-events: none;
    padding: 40px clamp(24px, 6vw, 96px);
    transition: left .34s cubic-bezier(.4,0,.2,1);
  }
  :root:not(.panel-collapsed) .detail { left: var(--panel-w); justify-content: flex-start; }
  .detail.show { display: flex; }
  .detail__card {
    position: relative;
    pointer-events: auto; max-width: 620px; width: 100%;
    background: linear-gradient(160deg, var(--plate-2), var(--plate));
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,.12); border-radius: 6px;
    color: var(--plate-ink); box-shadow: 0 24px 60px rgba(0,0,0,.4);
    overflow: hidden;
  }
  .detail__seal {
    position: absolute; z-index: 0; right: -18px; bottom: -18px;
    width: 200px; height: 200px; color: var(--blood-hot); opacity: .1;
    pointer-events: none;
  }
  .detail__seal svg { display: block; width: 100%; height: 100%; }
  .detail__accent, .detail__body { position: relative; z-index: 1; }
  .detail__accent {
    height: 46px; position: relative;
    background: linear-gradient(180deg, var(--blood-deep) 0%, var(--blood) 55%, var(--blood-hot) 100%);
  }
  .detail__accent .diamond {
    position: absolute; right: 22px; top: 50%; width: 16px; height: 16px;
    transform: translateY(-50%) rotate(45deg); background: #fff;
    box-shadow: 0 0 12px rgba(255,255,255,.65);
  }
  .detail__accent .eb {
    position: absolute; left: 24px; top: 50%; transform: translateY(-50%);
    color: #fff; font-size: 11px; letter-spacing: .22em; text-transform: uppercase; font-weight: 700;
  }
  .detail__body { padding: 22px 26px 26px; }
  .detail__mnum {
    font-size: clamp(30px, 5vw, 46px); font-weight: 700; letter-spacing: .06em;
    text-transform: uppercase; font-stretch: condensed; line-height: .98; color: #fff;
  }
  .detail__name {
    margin-top: 10px; font-size: clamp(16px, 2.4vw, 22px); letter-spacing: .08em;
    text-transform: uppercase; font-stretch: condensed; color: var(--blood-hot); font-weight: 700;
  }
  .detail__loc {
    margin-top: 14px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,.14);
    font-size: 12px; letter-spacing: .18em; text-transform: uppercase; color: var(--plate-dim);
    font-variant-numeric: tabular-nums;
  }
  .detail__desc {
    margin-top: 12px; font-size: 15px; line-height: 1.55; letter-spacing: .01em;
    color: var(--plate-ink); max-width: 60ch; text-transform: none;
  }
  .detail__actions { margin-top: 20px; display: flex; gap: 10px; }
  .btn {
    font-family: inherit; cursor: pointer; font-size: 11px; letter-spacing: .12em;
    text-transform: uppercase; padding: 9px 16px; border-radius: 4px;
    background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.24); color: var(--plate-ink);
  }
  .btn:hover { background: rgba(255,255,255,.15); }
  .btn--primary { background: var(--blood-deep); border-color: var(--blood-hot); }
  .btn--primary:hover { background: var(--blood); }

  /* ---- bottom bar ---- */
  .bottombar {
    position: fixed; z-index: 3; left: 0; right: 0; bottom: 0; height: 56px;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    padding: 0 18px 0 clamp(18px, 2vw, 24px);
    background: linear-gradient(to top, rgba(0,0,0,.30), transparent);
    pointer-events: none;
  }
  .bb-left { display: flex; align-items: center; gap: 12px; color: var(--ink); pointer-events: none; }
  .bb-word { font-size: 15px; font-weight: 700; letter-spacing: .3em; text-transform: uppercase; font-stretch: condensed; }
  .diamonds { display: flex; gap: 5px; align-items: center; }
  .diamonds i { width: 7px; height: 7px; transform: rotate(45deg); background: var(--ink-soft); display: block; }
  .diamonds i.red { background: var(--blood-hot); box-shadow: 0 0 6px rgba(217,74,42,.6); }
  .legend { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; pointer-events: none; }
  .keyhint { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--ink); }
  .keycap {
    display: inline-flex; align-items: center; justify-content: center; min-width: 20px; height: 20px;
    padding: 0 6px; border-radius: 4px; font-size: 11px; font-weight: 700;
    background: var(--key-bg); color: var(--key-ink); border: 1px solid var(--key-border);
    box-shadow: 0 1px 2px rgba(0,0,0,.3); letter-spacing: 0;
  }

  /* ---- scrub rail: visible + draggable spire position, doubles as
     scroll-wheel confirmation so "is scrolling doing anything" is never
     in doubt ---- */
  .scrubrail {
    position: fixed; z-index: 3; right: 14px; top: 88px; bottom: 72px;
    width: 28px; cursor: pointer; touch-action: none;
  }
  .scrubrail__track {
    position: absolute; left: 50%; top: 0; bottom: 0; width: 3px;
    transform: translateX(-50%); border-radius: 2px;
    background: var(--line);
  }
  .scrubrail__fill {
    position: absolute; left: 50%; bottom: 0; width: 3px; height: 0%;
    transform: translateX(-50%); border-radius: 2px;
    background: linear-gradient(to top, var(--blood-deep), var(--blood-hot));
  }
  .scrubrail__thumb {
    position: absolute; left: 50%; top: 0%; width: 15px; height: 15px;
    transform: translate(-50%, -50%); border-radius: 50%;
    background: var(--blood-hot); border: 2px solid var(--plate-ink);
    box-shadow: 0 1px 4px rgba(0,0,0,.4);
  }
  .scrubrail:hover .scrubrail__thumb, .scrubrail:focus-visible .scrubrail__thumb { transform: translate(-50%, -50%) scale(1.15); }
  @media (max-width: 760px) { .scrubrail { display: none; } }

  /* theme toggle: always reachable, independent of panel state */
  .theme-toggle-fixed { position: fixed; z-index: 5; top: 12px; right: 12px; }

  /* mobile panel toggle (corner button; desktop uses .panel-handle instead) */
  .panel-handle-mobile {
    position: fixed; z-index: 5; display: none;
    top: 12px; right: 82px;
  }

  /* ---- focus states (red, offset) ---- */
  a:focus-visible, button:focus-visible, input:focus-visible, [tabindex]:focus-visible {
    outline: 2px solid var(--blood-hot); outline-offset: 2px; border-radius: 3px;
  }
  /* fallback for browsers without :focus-visible */
  button:focus, input:focus { outline: 2px solid var(--blood-hot); outline-offset: 2px; }
  button:focus:not(:focus-visible), input:focus:not(:focus-visible) { outline: none; }

  .visually-hidden {
    position: absolute !important; width: 1px; height: 1px; padding: 0; margin: -1px;
    overflow: hidden; clip: rect(0 0 0 0); white-space: nowrap; border: 0;
  }

  /* ---------------- responsive ---------------- */
  @media (max-width: 760px) {
    .panel {
      width: 100%; bottom: auto; max-height: 62vh; height: auto;
      box-shadow: 0 12px 30px rgba(0,0,0,.35);
      border-right: none; border-bottom: 1px solid var(--line);
    }
    :root.panel-collapsed .panel { transform: translateY(-100%); }
    .panel-handle { display: none; }
    .panel-handle-mobile { display: inline-flex; }
    .detail, :root:not(.panel-collapsed) .detail {
      left: 0; right: 0; top: auto; bottom: 56px;
      align-items: flex-end; justify-content: center; padding: 12px;
    }
    .detail__card { max-width: 100%; }
    .legend .keyhint span.lbl { display: none; }
    .bb-word { display: none; }
  }
  @media (max-width: 420px) {
    .wordmark { font-size: 19px; letter-spacing: .26em; }
    .panel { max-height: 68vh; }
  }

  @media (prefers-reduced-motion: reduce) {
    .marker, #annotation, .chev, .panel, .panel-handle, .detail { transition: none; }
  }
</style>
</head>
<body>

<div id="stage">
  <canvas id="spireCanvas" aria-hidden="true"></canvas>
</div>

<div id="markerLayer" aria-hidden="true">
  <div class="marker" id="marker"><span class="stem"></span></div>
</div>
<div id="annotation" aria-hidden="true"></div>

<button class="panel-handle" id="panelHandle" type="button" aria-expanded="true" aria-controls="panel">
  <span class="chev" aria-hidden="true">◂</span><span>Browse</span>
</button>
<button class="iconbtn panel-handle-mobile" id="panelHandleMobile" type="button" aria-expanded="true" aria-controls="panel">MENU</button>

<div class="scrubrail" id="scrubRail" role="slider" tabindex="0" aria-label="Position along the spire"
     aria-orientation="vertical" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
  <div class="scrubrail__track" aria-hidden="true"></div>
  <div class="scrubrail__fill" id="scrubFill" aria-hidden="true"></div>
  <div class="scrubrail__thumb" id="scrubThumb" aria-hidden="true"></div>
</div>

<button class="iconbtn theme-toggle-fixed" id="themeToggle" type="button" aria-pressed="false">DARK</button>

<!-- LEFT PANEL -->
<section class="panel" id="panel" aria-label="DNA memory browser">
  <div class="panel__head">
    <div class="brandrow">
      <div>
        <div class="wordmark">DNA</div>
        <div class="subject">SUBJECT · <b id="subjectName">EZIO AUDITORE</b></div>
      </div>
    </div>
  </div>

  <div class="searchwrap">
    <div class="searchbox" role="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      <label for="search" class="visually-hidden">Search sequences and memories</label>
      <input id="search" type="text" autocomplete="off" spellcheck="false"
             placeholder="Search sequences & memories" aria-describedby="searchCount">
    </div>
    <div class="searchmeta">
      <span id="searchCount" aria-live="polite">14 sequences, 66 memories</span>
      <button class="clearbtn" id="clearBtn" type="button">Clear</button>
    </div>
  </div>

  <div class="seqlist" id="seqList" aria-label="Sequences"></div>
  <div class="emptystate" id="emptyState" role="status">No memories match your search</div>
</section>

<!-- MEMORY DETAIL -->
<div class="detail" id="detail" role="dialog" aria-modal="false" aria-labelledby="detailName" aria-hidden="true">
  <div class="detail__card">
    <div class="detail__seal" id="detailSeal" aria-hidden="true"></div>
    <div class="detail__accent"><span class="eb" id="detailEyebrow">SEQUENCE 1</span><span class="diamond"></span></div>

    var rng = makeRng(opts.seed || 1337);

    // Scaled up from the original snake path so discs have enough breathing
    // room along the curve relative to their radius (dense enough to read
    // as an overlapping stacked-coin ridge, not a solid fused tube).
    var controlPoints = opts.controlPoints || [
      [0, 0, 0],
      [6.7, -4.8, -20.8],
      [-7.4, -10.2, -43.2],
      [5.4, -16.8, -65.6],
      [-6.1, -22.7, -88],
      [8.3, -29.4, -110.4],
      [-3.8, -36.2, -132.8],
      [1.9, -42.4, -155.2],
      [-5.8, -48.3, -177.6],
      [0, -54.4, -200]
    ];

    var curve = makeCurve(controlPoints);
    var frameTable = buildFrameTable(curve, 900);

    var radius = opts.radius || 1.15;
    var thickness = opts.thickness || 0.2;
    var twistPerDisc = opts.twistPerDisc != null ? opts.twistPerDisc : 0.085;

    var discCenter = new Float32Array(discCount * 3);
    var discTangent = new Float32Array(discCount * 3);
    var discFrontVerts = new Float32Array(discCount * 18);
    var discBackVerts = new Float32Array(discCount * 18);
    var discSideNormals = new Float32Array(discCount * 18);
    var discCapBrightFront = new Float32Array(discCount);
    var discCapBrightBack = new Float32Array(discCount);
    var discSideBright = new Float32Array(discCount * 6);
    var discSegmentIndex = new Int32Array(discCount);
    var discGreyJitter = new Float32Array(discCount);
    var discRedJitter = new Float32Array(discCount);
    var discU = new Float32Array(discCount);

    var HEX_ANGLE = Math.PI / 3;

    for (var i = 0; i < discCount; i++) {
      var u = discCount > 1 ? i / (discCount - 1) : 0;
      discU[i] = u;
      var fr = sampleFrame(frameTable, u);
      var jitterR = radius * (0.94 + rng() * 0.14);
      var jitterTh = thickness * (0.85 + rng() * 0.4);
      var twist = i * twistPerDisc;

      discCenter[i * 3] = fr.pos[0];
      discCenter[i * 3 + 1] = fr.pos[1];
      discCenter[i * 3 + 2] = fr.pos[2];
      discTangent[i * 3] = fr.tangent[0];
      discTangent[i * 3 + 1] = fr.tangent[1];
      discTangent[i * 3 + 2] = fr.tangent[2];

      var frontCenter = add(fr.pos, scale(fr.tangent, jitterTh * 0.5));
      var backCenter = add(fr.pos, scale(fr.tangent, -jitterTh * 0.5));

      for (var k = 0; k < 6; k++) {
        var ang = twist + k * HEX_ANGLE;
        var ca = Math.cos(ang), sa = Math.sin(ang);
        var offset = add(scale(fr.right, ca * jitterR), scale(fr.up, sa * jitterR));
        var fv = add(frontCenter, offset);
        var bv = add(backCenter, offset);
        discFrontVerts[i * 18 + k * 3] = fv[0];
        discFrontVerts[i * 18 + k * 3 + 1] = fv[1];
        discFrontVerts[i * 18 + k * 3 + 2] = fv[2];
        discBackVerts[i * 18 + k * 3] = bv[0];
        discBackVerts[i * 18 + k * 3 + 1] = bv[1];
        discBackVerts[i * 18 + k * 3 + 2] = bv[2];

        // side normal: mid-angle radial direction for edge k -> k+1
        var midAng = twist + (k + 0.5) * HEX_ANGLE;
        var sn = add(scale(fr.right, Math.cos(midAng)), scale(fr.up, Math.sin(midAng)));
        discSideNormals[i * 18 + k * 3] = sn[0];
        discSideNormals[i * 18 + k * 3 + 1] = sn[1];
        discSideNormals[i * 18 + k * 3 + 2] = sn[2];
        // ambient + clamped diffuse: never crushes to near-black, still
        // reads a clear light/shadow gradient across facets.
        var sb = 0.52 + clamp(dot(sn, LIGHT_DIR), 0, 1) * 0.58;
        discSideBright[i * 6 + k] = clamp(sb, 0.4, 1.12);
      }

      var bf = 0.55 + clamp(dot(fr.tangent, LIGHT_DIR), 0, 1) * 0.62;
      var bb = 0.55 + clamp(dot(scale(fr.tangent, -1), LIGHT_DIR), 0, 1) * 0.62;
      discCapBrightFront[i] = clamp(bf, 0.42, 1.18);
      discCapBrightBack[i] = clamp(bb, 0.42, 1.18);

      discSegmentIndex[i] = Math.min(segments - 1, Math.floor(i / discsPerSegment));
      discGreyJitter[i] = rng();
      discRedJitter[i] = rng();
    }

    var repDisc = new Int32Array(segments);
    for (var s = 0; s < segments; s++) {
      repDisc[s] = Math.min(discCount - 1, s * discsPerSegment + (discsPerSegment >> 1));
    }

    // polyline of the curve for the faint center wire
    var wireRes = 180;
    var wire = new Float32Array(wireRes * 3);
    for (var w = 0; w < wireRes; w++) {
      var p2 = curve.pointAtU(w / (wireRes - 1));
      wire[w * 3] = p2[0]; wire[w * 3 + 1] = p2[1]; wire[w * 3 + 2] = p2[2];
    }

    return {
      discCount: discCount, segments: segments, discsPerSegment: discsPerSegment,
      curve: curve, frameTable: frameTable,
      discCenter: discCenter, discTangent: discTangent,
      discFrontVerts: discFrontVerts, discBackVerts: discBackVerts,
      discSideNormals: discSideNormals,
      discCapBrightFront: discCapBrightFront, discCapBrightBack: discCapBrightBack,
      discSideBright: discSideBright,
      discSegmentIndex: discSegmentIndex,
      discGreyJitter: discGreyJitter, discRedJitter: discRedJitter,
      discU: discU,
      repDisc: repDisc,
      wire: wire, wireRes: wireRes
    };
  }

  // ---------------------------------------------------------------------
  // Background "plexus" — cheap decorative dot/line mesh rendered once to
  // an offscreen canvas and blitted every frame.
  // ---------------------------------------------------------------------
  function buildPlexus(w, h, dpr, rng, colorRgb) {
    var off = document.createElement('canvas');
    off.width = Math.max(1, Math.round(w * dpr));
    off.height = Math.max(1, Math.round(h * dpr));
    var ctx = off.getContext('2d');
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    var count = 40;
    var pts = [];
    for (var i = 0; i < count; i++) {
      pts.push({ x: rng() * w, y: rng() * h });
    }
    var r = colorRgb[0], g = colorRgb[1], b = colorRgb[2];

    // connecting lines to nearby points
    ctx.lineWidth = 1;
    for (i = 0; i < count; i++) {
      for (var j = i + 1; j < count; j++) {
        var dx = pts[i].x - pts[j].x, dy = pts[i].y - pts[j].y;
        var d = Math.sqrt(dx * dx + dy * dy);
        var maxD = Math.min(w, h) * 0.18;
        if (d < maxD) {
          var a = (1 - d / maxD) * 0.10;
          ctx.strokeStyle = 'rgba(' + r + ',' + g + ',' + b + ',' + a.toFixed(3) + ')';
          ctx.beginPath();
          ctx.moveTo(pts[i].x, pts[i].y);
          ctx.lineTo(pts[j].x, pts[j].y);
          ctx.stroke();
        }
      }
    }
    // soft diamond glints on a subset of points
    for (i = 0; i < count; i++) {
      if (rng() > 0.4) continue;
      var s = 2.5 + rng() * 4;
      var p = pts[i];
      var alpha = 0.08 + rng() * 0.10;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(Math.PI / 4);
      ctx.fillStyle = 'rgba(' + r + ',' + g + ',' + b + ',' + alpha.toFixed(3) + ')';
      ctx.fillRect(-s / 2, -s / 2, s, s);
      ctx.restore();
    }
    return off;
  }

  // ---------------------------------------------------------------------
  // Spire instance
  // ---------------------------------------------------------------------
  function create(canvas, options) {
    options = options || {};
    var segments = options.segments || 14;
    var discsPerSegment = options.discsPerSegment || 12;

    var theme = Object.assign({
      ground: '#e8e7e4',
      discLow: '#8f8d88',
      discHigh: '#b9b7b2',
      redLow: '#7a1004',
      redHigh: '#d94a2a'
    }, options.theme || {});

    var geo = buildGeometry({
      segments: segments,
      discsPerSegment: discsPerSegment,
      radius: options.radius,
      thickness: options.thickness,
      twistPerDisc: options.twistPerDisc,
      controlPoints: options.controlPoints,
      seed: options.seed
    });

    var ctx = canvas.getContext('2d');

    // ------------- mutable render state -------------
    var state = {
      camT: 0, camTTarget: 0,
      segmentRedness: new Float32Array(segments),
      segmentRednessTarget: new Float32Array(segments),
      activeSegment: null,
      width: 0, height: 0, dpr: 1,
      fovDeg: options.fov || 75,
      fogStart: options.fogStart != null ? options.fogStart : 27,
      fogEnd: options.fogEnd != null ? options.fogEnd : 66,
      camRightOffset: options.camRightOffset != null ? options.camRightOffset : 4.4,
      camUpOffset: options.camUpOffset != null ? options.camUpOffset : 2.6,
      camPullback: options.camPullback != null ? options.camPullback : 4.2,
      lookAhead: options.lookAhead != null ? options.lookAhead : 0.05,
      reducedMotion: !!options.reducedMotion
    };

    var groundRgb = hexToRgb(theme.ground);
    var discLowRgb = hexToRgb(theme.discLow);
    var discHighRgb = hexToRgb(theme.discHigh);
    var redLowRgb = hexToRgb(theme.redLow);
    var redHighRgb = hexToRgb(theme.redHigh);

    // last camera basis, refreshed every render — used by getSegmentScreenPos
    var lastCam = {
      pos: [0, 0, 0], forward: [0, 0, 1], right: [1, 0, 0], up: [0, 1, 0],
      f: 1, aspect: 1, valid: false
    };

    var plexusCanvas = null;
    var rngBg = makeRng(4242);

    var dirty = true;
    var rafId = null;
    var destroyed = false;
    var lastTime = null;

    // reusable scratch buffers (no per-frame allocation in hot loops)
    var order = new Int32Array(geo.discCount);
    var zbuf = new Float32Array(geo.discCount);
    var scratch12 = new Float32Array(24); // 12 verts * (x,y)

    function resolveColor(low, high, jitter) {
      return [
        lerp(low[0], high[0], jitter),
        lerp(low[1], high[1], jitter),
        lerp(low[2], high[2], jitter)
      ];
    }

    function rebuildPlexus() {
      if (!state.width || !state.height) return;
      // ground-tinted low contrast: use ink-ish tone relative to ground brightness
      var brightness = (groundRgb[0] + groundRgb[1] + groundRgb[2]) / 3;
      var lineTint = brightness > 128 ? [60, 58, 52] : [230, 228, 222];
      plexusCanvas = buildPlexus(state.width, state.height, state.dpr, rngBg, lineTint);
    }

    function resize() {
      var rect = canvas.getBoundingClientRect();
      var w = Math.max(1, rect.width || canvas.clientWidth || canvas.width || 1);
      var h = Math.max(1, rect.height || canvas.clientHeight || canvas.height || 1);
      var dpr = Math.min(2, window.devicePixelRatio || 1);
      state.width = w; state.height = h; state.dpr = dpr;
      canvas.width = Math.round(w * dpr);
      canvas.height = Math.round(h * dpr);
      rebuildPlexus();
      markDirty();
    }

    function markDirty() {
      dirty = true;
      if (rafId === null && !destroyed) {
        lastTime = null;
        rafId = requestAnimationFrame(loop);
      }
    }

    function setCamera(t) {
      state.camTTarget = clamp(t, 0, 1);
      markDirty();
    }

    function setActiveSegment(i) {
      state.activeSegment = (i === null || i === undefined) ? null : clamp(i | 0, 0, segments - 1);
      for (var s = 0; s < segments; s++) {
        state.segmentRednessTarget[s] = (s === state.activeSegment) ? 1 : 0;
      }
      markDirty();
    }

    function setTheme(next) {
      Object.assign(theme, next || {});
      groundRgb = hexToRgb(theme.ground);
      discLowRgb = hexToRgb(theme.discLow);
      discHighRgb = hexToRgb(theme.discHigh);
      redLowRgb = hexToRgb(theme.redLow);
      redHighRgb = hexToRgb(theme.redHigh);
      rebuildPlexus();
      markDirty();
    }

    // ---------------- camera & projection ----------------
    function updateCameraBasis(dt) {
      if (state.reducedMotion) {
        state.camT = state.camTTarget;
        for (var rms = 0; rms < segments; rms++) state.segmentRedness[rms] = state.segmentRednessTarget[rms];
      }
      var camRate = 6.0; // higher = snappier easing
      var diffCam = state.camTTarget - state.camT;
      var camMoving = Math.abs(diffCam) > 0.0004;
      if (camMoving) {
        var factor = 1 - Math.exp(-camRate * dt);
        state.camT += diffCam * factor;
        if (Math.abs(state.camTTarget - state.camT) < 0.0004) state.camT = state.camTTarget;
      } else {
        state.camT = state.camTTarget;
      }

      var segRate = 5.0;
      var segAnimating = false;
      for (var s = 0; s < segments; s++) {
        var diff = state.segmentRednessTarget[s] - state.segmentRedness[s];
        if (Math.abs(diff) > 0.001) {
          segAnimating = true;
          var f = 1 - Math.exp(-segRate * dt);
          state.segmentRedness[s] += diff * f;
        } else {
          state.segmentRedness[s] = state.segmentRednessTarget[s];
        }
      }

      var frame = sampleFrame(geo.frameTable, state.camT);
      var camPos = add(
        add(frame.pos, scale(frame.right, state.camRightOffset)),
        add(scale(frame.up, state.camUpOffset), scale(frame.tangent, -state.camPullback))
      );
      var lookT = clamp(state.camT + state.lookAhead, 0, 1);
      var lookFrame = sampleFrame(geo.frameTable, lookT);
      var forward = normalize(sub(lookFrame.pos, camPos));
      var worldUp = [0, 1, 0];
      if (Math.abs(dot(forward, worldUp)) > 0.995) worldUp = [1, 0, 0];
      var right = normalize(cross(forward, worldUp));
      var up = cross(right, forward);

      var fovRad = state.fovDeg * Math.PI / 180;
      var f = 1 / Math.tan(fovRad / 2);
      var aspect = state.width / state.height || 1;

      lastCam.pos = camPos; lastCam.forward = forward; lastCam.right = right; lastCam.up = up;
      lastCam.f = f; lastCam.aspect = aspect; lastCam.valid = true;

      return camMoving || segAnimating;
    }

    function project(px, py, pz, outArr, outIdx) {
      var dx = px - lastCam.pos[0], dy = py - lastCam.pos[1], dz = pz - lastCam.pos[2];
      var vx = dx * lastCam.right[0] + dy * lastCam.right[1] + dz * lastCam.right[2];
      var vy = dx * lastCam.up[0] + dy * lastCam.up[1] + dz * lastCam.up[2];
      var vz = dx * lastCam.forward[0] + dy * lastCam.forward[1] + dz * lastCam.forward[2];
      if (vz < 0.05) vz = 0.05;
      var ndcX = (vx * lastCam.f) / (vz * lastCam.aspect);
      var ndcY = (vy * lastCam.f) / vz;
      outArr[outIdx] = (ndcX * 0.5 + 0.5) * state.width;
      outArr[outIdx + 1] = (1 - (ndcY * 0.5 + 0.5)) * state.height;
      return vz;
    }

    function viewZ(px, py, pz) {
      var dx = px - lastCam.pos[0], dy = py - lastCam.pos[1], dz = pz - lastCam.pos[2];
      return dx * lastCam.forward[0] + dy * lastCam.forward[1] + dz * lastCam.forward[2];
    }

    // ---------------- rendering ----------------
    function colorStr(r, g, b, a) {
      r = r < 0 ? 0 : (r > 255 ? 255 : r) | 0;
      g = g < 0 ? 0 : (g > 255 ? 255 : g) | 0;
      b = b < 0 ? 0 : (b > 255 ? 255 : b) | 0;
      if (a === undefined) return 'rgb(' + r + ',' + g + ',' + b + ')';
      return 'rgba(' + r + ',' + g + ',' + b + ',' + a.toFixed(3) + ')';
    }

    function render() {
      var w = state.width, h = state.height, dpr = state.dpr;
      if (!w || !h) return;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.clearRect(0, 0, w, h);

      // background ground fill + plexus
      ctx.fillStyle = colorStr(groundRgb[0], groundRgb[1], groundRgb[2]);
      ctx.fillRect(0, 0, w, h);
      if (plexusCanvas) {
        ctx.save();
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.drawImage(plexusCanvas, 0, 0, w * dpr, h * dpr);
        ctx.restore();
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      var fogRgb = groundRgb;
      var fogStart = state.fogStart, fogEnd = state.fogEnd;

      // thin center wire (drawn behind the discs, low alpha)
      ctx.strokeStyle = colorStr(groundRgb[0] * 0.4, groundRgb[1] * 0.4, groundRgb[2] * 0.4, 0.18);
      ctx.lineWidth = 1;
      ctx.beginPath();
      var wireStarted = false;
      for (var wi = 0; wi < geo.wireRes; wi++) {
        var wx = geo.wire[wi * 3], wy = geo.wire[wi * 3 + 1], wz = geo.wire[wi * 3 + 2];
        var vz0 = viewZ(wx, wy, wz);
        if (vz0 < 0.1) { wireStarted = false; continue; }
        var sx = 0, sy = 0;
        var dx = wx - lastCam.pos[0], dy = wy - lastCam.pos[1], dz = wz - lastCam.pos[2];
        var vx = dx * lastCam.right[0] + dy * lastCam.right[1] + dz * lastCam.right[2];
        var vy = dx * lastCam.up[0] + dy * lastCam.up[1] + dz * lastCam.up[2];
        var ndcX = (vx * lastCam.f) / (vz0 * lastCam.aspect);
        var ndcY = (vy * lastCam.f) / vz0;
        sx = (ndcX * 0.5 + 0.5) * w;
        sy = (1 - (ndcY * 0.5 + 0.5)) * h;
        if (!wireStarted) { ctx.moveTo(sx, sy); wireStarted = true; }
        else ctx.lineTo(sx, sy);
      }
      ctx.stroke();

      // ---- z-sort discs (back to front) ----
      var n = geo.discCount;
      var visibleCount = 0;
      for (var i = 0; i < n; i++) {
        var cx = geo.discCenter[i * 3], cy = geo.discCenter[i * 3 + 1], cz = geo.discCenter[i * 3 + 2];
        var vz = viewZ(cx, cy, cz);
        if (vz < 0.15) continue; // behind camera
        var dxf = cx - lastCam.pos[0], dyf = cy - lastCam.pos[1], dzf = cz - lastCam.pos[2];
        var dist = Math.sqrt(dxf * dxf + dyf * dyf + dzf * dzf);
        if (dist > fogEnd + 4) continue; // beyond fog, cull
        order[visibleCount] = i;
        zbuf[i] = vz;
        visibleCount++;
      }
      var orderSlice = order.subarray(0, visibleCount);
      Array.prototype.sort.call(orderSlice, function (a, b) { return zbuf[b] - zbuf[a]; });

      for (var oi = 0; oi < visibleCount; oi++) {
        drawDisc(orderSlice[oi], fogRgb, fogStart, fogEnd);
      }
    }

    function drawDisc(i, fogRgb, fogStart, fogEnd) {
      var cx = geo.discCenter[i * 3], cy = geo.discCenter[i * 3 + 1], cz = geo.discCenter[i * 3 + 2];
      var dxf = cx - lastCam.pos[0], dyf = cy - lastCam.pos[1], dzf = cz - lastCam.pos[2];
      var dist = Math.sqrt(dxf * dxf + dyf * dyf + dzf * dzf);
      var fogT = clamp((dist - fogStart) / Math.max(0.001, fogEnd - fogStart), 0, 1);
      if (fogT >= 0.985) return;

      var segIdx = geo.discSegmentIndex[i];
      var redness = state.segmentRedness[segIdx];
      var baseGrey = resolveColor(discLowRgb, discHighRgb, geo.discGreyJitter[i]);
      var baseRed = resolveColor(redLowRgb, redHighRgb, geo.discRedJitter[i]);
      var baseColor = redness > 0.001 ? lerp3(baseGrey, baseRed, redness) : baseGrey;
      var alpha = lerp(1.0, 0.88, redness);

      // decide which cap faces the camera
      var tx = geo.discTangent[i * 3], ty = geo.discTangent[i * 3 + 1], tz = geo.discTangent[i * 3 + 2];
      var toCam = [lastCam.pos[0] - cx, lastCam.pos[1] - cy, lastCam.pos[2] - cz];
      var facingFront = (tx * toCam[0] + ty * toCam[1] + tz * toCam[2]) > 0;
      var capBright = facingFront ? geo.discCapBrightFront[i] : geo.discCapBrightBack[i];
      var capVerts = facingFront ? geo.discFrontVerts : geo.discBackVerts;
      var otherVerts = facingFront ? geo.discBackVerts : geo.discFrontVerts;

      // project the 12 verts (6 near cap + 6 far cap) into scratch buffer
      var base = i * 18;
      for (var k = 0; k < 6; k++) {
        project(capVerts[base + k * 3], capVerts[base + k * 3 + 1], capVerts[base + k * 3 + 2], scratch12, k * 2);
        project(otherVerts[base + k * 3], otherVerts[base + k * 3 + 1], otherVerts[base + k * 3 + 2], scratch12, 12 + k * 2);
      }

      var fMix = 1 - fogT;

      // side quads (culled to those facing roughly toward camera), drawn first
      for (var e = 0; e < 6; e++) {
        var nx = geo.discSideNormals[base + e * 3], ny = geo.discSideNormals[base + e * 3 + 1], nz = geo.discSideNormals[base + e * 3 + 2];
        var faceDot = nx * toCam[0] + ny * toCam[1] + nz * toCam[2];
        if (faceDot <= 0) continue;
        var e2 = (e + 1) % 6;
        var sideBright = geo.discSideBright[i * 6 + e] * 0.82; // sides read a touch darker than the cap
        var sr = lerp(fogRgb[0], baseColor[0] * sideBright, fMix);
        var sg = lerp(fogRgb[1], baseColor[1] * sideBright, fMix);
        var sb = lerp(fogRgb[2], baseColor[2] * sideBright, fMix);
        ctx.fillStyle = colorStr(sr, sg, sb, alpha);
        ctx.beginPath();
        ctx.moveTo(scratch12[e * 2], scratch12[e * 2 + 1]);
        ctx.lineTo(scratch12[e2 * 2], scratch12[e2 * 2 + 1]);
        ctx.lineTo(scratch12[12 + e2 * 2], scratch12[12 + e2 * 2 + 1]);
        ctx.lineTo(scratch12[12 + e * 2], scratch12[12 + e * 2 + 1]);
        ctx.closePath();
        ctx.fill();
      }

      // near cap (the hex face)
      var cr = lerp(fogRgb[0], baseColor[0] * capBright, fMix);
      var cg = lerp(fogRgb[1], baseColor[1] * capBright, fMix);
      var cb = lerp(fogRgb[2], baseColor[2] * capBright, fMix);
      ctx.fillStyle = colorStr(cr, cg, cb, alpha);
      ctx.beginPath();
      ctx.moveTo(scratch12[0], scratch12[1]);
      for (var kk = 1; kk < 6; kk++) ctx.lineTo(scratch12[kk * 2], scratch12[kk * 2 + 1]);
      ctx.closePath();
      ctx.fill();

      // subtle rim highlight scaled by how lit the cap is
      var rimAlpha = clamp((capBright - 0.6) * 0.35, 0, 0.32) * fMix;
      if (rimAlpha > 0.01) {
        ctx.strokeStyle = 'rgba(255,252,245,' + rimAlpha.toFixed(3) + ')';
        ctx.lineWidth = 1;
        ctx.stroke();
      }
    }

    // ---------------- main loop ----------------
    function loop(time) {
      if (destroyed) return;
      if (lastTime === null) lastTime = time;
      var dt = Math.min(0.05, Math.max(0, (time - lastTime) / 1000));
      lastTime = time;

      var animating = updateCameraBasis(dt);
      if (dirty || animating) {
        render();
        dirty = false;
      }

      if (animating) {
        rafId = requestAnimationFrame(loop);
      } else {
        rafId = null; // battery-friendly: stop the loop until something changes
      }
    }

    function tick() {
      updateCameraBasis(0.016);
      render();
    }

    function getSegmentScreenPos(index) {
      index = clamp(index | 0, 0, segments - 1);
      if (!lastCam.valid) tick();
      var di = geo.repDisc[index];
      var cx = geo.discCenter[di * 3], cy = geo.discCenter[di * 3 + 1], cz = geo.discCenter[di * 3 + 2];
      var vz = viewZ(cx, cy, cz);
      var out = { x: 0, y: 0, visible: false };
      var tmp = [0, 0];
      project(cx, cy, cz, tmp, 0);
      out.x = tmp[0]; out.y = tmp[1];
      out.visible = vz > 0.15 && out.x > -0.1 * state.width && out.x < 1.1 * state.width &&
        out.y > -0.1 * state.height && out.y < 1.1 * state.height;
      return out;
    }

    function destroy() {
      destroyed = true;
      if (rafId !== null) cancelAnimationFrame(rafId);
      rafId = null;
      plexusCanvas = null;
    }

    // ---------------- hit-testing: click/hover directly on a disc ----------------
    var hitScratch = new Float32Array(12);
    function pointInHex(x, y, verts) {
      var inside = false;
      for (var i = 0, j = 5; i < 6; j = i++) {
        var xi = verts[i * 2], yi = verts[i * 2 + 1];
        var xj = verts[j * 2], yj = verts[j * 2 + 1];
        if (((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi)) inside = !inside;
      }
      return inside;
    }

    function pickSegmentAt(clientX, clientY) {
      if (!lastCam.valid || !state.width || !state.height) return null;
      var rect = canvas.getBoundingClientRect();
      var px = (clientX - rect.left), py = (clientY - rect.top);
      var n = geo.discCount;
      var best = -1, bestZ = Infinity;
      var tmp = [0, 0];
      for (var i = 0; i < n; i++) {
        var cx = geo.discCenter[i * 3], cy = geo.discCenter[i * 3 + 1], cz = geo.discCenter[i * 3 + 2];
        var vz = viewZ(cx, cy, cz);
        if (vz < 0.15 || vz > bestZ) continue;
        project(cx, cy, cz, tmp, 0);
        var dx = tmp[0] - px, dy = tmp[1] - py;
        if (dx * dx + dy * dy > 7000) continue; // cheap radius reject before precise poly test
        var tx = geo.discTangent[i * 3], ty = geo.discTangent[i * 3 + 1], tz = geo.discTangent[i * 3 + 2];
        var toCamX = lastCam.pos[0] - cx, toCamY = lastCam.pos[1] - cy, toCamZ = lastCam.pos[2] - cz;
        var facingFront = (tx * toCamX + ty * toCamY + tz * toCamZ) > 0;
        var capVerts = facingFront ? geo.discFrontVerts : geo.discBackVerts;
        var base = i * 18;
        for (var k = 0; k < 6; k++) project(capVerts[base + k * 3], capVerts[base + k * 3 + 1], capVerts[base + k * 3 + 2], hitScratch, k * 2);
        if (pointInHex(px, py, hitScratch)) { best = i; bestZ = vz; }
      }
      return best >= 0 ? geo.discSegmentIndex[best] : null;
    }

    // initial sizing
    resize();

    return {
      setCamera: setCamera,
      setActiveSegment: setActiveSegment,
      setTheme: setTheme,
      setReducedMotion: function (v) { state.reducedMotion = !!v; markDirty(); },
      resize: resize,
      destroy: destroy,
      tick: tick,
      getSegmentScreenPos: getSegmentScreenPos,
      pickSegmentAt: pickSegmentAt,
      get segments() { return segments; },
      get discsPerSegment() { return discsPerSegment; }
    };
  }

  return { create: create };
});

</script>

<!-- ==================== application ==================== -->
<script>
(function () {
  'use strict';
  var DATA = JSON.parse(document.getElementById('ac-data').textContent);
  var SEQUENCES = DATA.sequences;
  var SEG_COUNT = SEQUENCES.length;
  var DISCS_PER = 12;
  var TOTAL_DISCS = SEG_COUNT * DISCS_PER;
  var TOTAL_MEMORIES = SEQUENCES.reduce(function (a, s) { return a + s.memories.length; }, 0);

  var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var CANVAS_THEME = {
    light: { ground:'#e8e7e4', discLow:'#8f8d88', discHigh:'#b9b7b2', redLow:'#7a1004', redHigh:'#d94a2a' },
    dark:  { ground:'#17181a', discLow:'#4a4a4d', discHigh:'#6d6d6f', redLow:'#8f1607', redHigh:'#ea5a34' }
  };

  var canvas = document.getElementById('spireCanvas');
  var spire = Spire.create(canvas, {
    segments: SEG_COUNT,
    discsPerSegment: DISCS_PER,
    reducedMotion: reduceMotion,
    // Camera pulled back with a slightly narrower FOV so the current
    // clump reads clearly without giant foreground discs.
    fov: 58,
    camPullback: 16.5,
    camUpOffset: 5.2,
    camRightOffset: 7.4,
    lookAhead: 0.055,
    fogStart: 38,
    fogEnd: 96,
    theme: (window.matchMedia('(prefers-color-scheme: dark)').matches ? CANVAS_THEME.dark : CANVAS_THEME.light)
  });

  // ---- camera parameterisation ----
  // representative disc u for a segment matches spire's internal repDisc.
  function segToCamT(i) {
    var repU = (i * DISCS_PER + (DISCS_PER >> 1)) / (TOTAL_DISCS - 1);
    return Math.max(0, Math.min(1, repU - 0.055));
  }
  var cameraT = segToCamT(0);
  spire.setCamera(cameraT);

  // ---------------------------------------------------------------
  // Build the accordion from data
  // ---------------------------------------------------------------
  var seqList = document.getElementById('seqList');
  document.getElementById('subjectName').textContent = DATA.subject;

  var seqEls = [];   // per-sequence element records
  function esc(s) { return String(s); }

  // Procedurally generated crest per sequence — a hexagon (echoing the
  // spire's own disc shape) with a rotated diamond (echoing the marker
  // motif), rotation offset deterministically by sequence number so each
  // one reads as distinct. Stands in for artwork we have no way to source.
  function seqSeal(n) {
    var rot = (n * 137) % 360;
    return '<svg viewBox="0 0 100 100" aria-hidden="true">' +
      '<g transform="rotate(' + rot + ' 50 50)">' +
        '<polygon points="50,6 91,28 91,72 50,94 9,72 9,28" fill="none" stroke="currentColor" stroke-width="6"/>' +
      '</g>' +
      '<rect x="36" y="36" width="28" height="28" transform="rotate(45 50 50)" fill="currentColor"/>' +
    '</svg>';
  }

  SEQUENCES.forEach(function (seq, si) {
    var wrap = document.createElement('div');
    wrap.className = 'seq';

    var regionId = 'region-' + seq.n;
    var headerId = 'seqbtn-' + seq.n;

    var header = document.createElement('button');
    header.type = 'button';
    header.className = 'seq-header';
    header.id = headerId;
    header.setAttribute('aria-expanded', 'false');
    header.setAttribute('aria-controls', regionId);
    header.dataset.seq = si;
    header.innerHTML =
      '<span class="chev" aria-hidden="true">▸</span>' +
      '<span class="seq-seal">' + seqSeal(seq.n) + '</span>' +
      '<span class="seq-titlewrap">' +
        '<span class="seq-eyebrow">SEQUENCE ' + seq.n + '</span>' +
        '<span class="seq-title" data-field="title">' + esc(seq.title) + '</span>' +
      '</span>' +
      '<span class="seq-year tnum">' + esc(seq.year) + '</span>';

    var region = document.createElement('div');
    region.className = 'seq-region';
    region.id = regionId;
    region.setAttribute('role', 'region');
    region.setAttribute('aria-labelledby', headerId);
    region.hidden = true;

    var memEls = [];
    seq.memories.forEach(function (mem, mi) {
      var row = document.createElement('button');
      row.type = 'button';
      row.className = 'mem-row';
      row.dataset.seq = si;
      row.dataset.mem = mi;
      row.innerHTML =
        '<span class="m-top">' +
          '<span class="m-title" data-field="mtitle">' + esc(mem.title) + '</span>' +
          '<span class="m-num tnum">MEM ' + mem.n + '</span>' +
        '</span>' +
        '<span class="m-sub"><span data-field="mloc">' + esc(mem.location) + '</span> · <span class="tnum">' + esc(mem.year) + '</span></span>';
      row.addEventListener('click', function () { selectMemory(si, mi); });
      region.appendChild(row);
      memEls.push({ el: row, mem: mem, titleEl: row.querySelector('[data-field="mtitle"]'), locEl: row.querySelector('[data-field="mloc"]') });
    });

    header.addEventListener('click', function () { toggleSequence(si); });

    wrap.appendChild(header);
    wrap.appendChild(region);
    seqList.appendChild(wrap);

    seqEls.push({
      wrap: wrap, header: header, region: region, seq: seq,
      titleEl: header.querySelector('[data-field="title"]'), mems: memEls
    });
  });

  // ---------------------------------------------------------------
  // Sequence expand / collapse (single-open accordion)
  // ---------------------------------------------------------------
  var expandedSeq = null;
  var focusSeq = 0; // the segment shown red + labeled on the spire — persists
                     // whether or not the panel is open, like the AC reference

  function setSequenceCamera(si) {
    focusSeq = si;
    cameraT = segToCamT(si);
    spire.setActiveSegment(si);
    spire.setCamera(cameraT);
    updateAnnotation(si);
  }

  function openSequence(si, opts) {
    opts = opts || {};
    var rec = seqEls[si];
    if (expandedSeq !== null && expandedSeq !== si) collapseSequence(expandedSeq);
    rec.header.setAttribute('aria-expanded', 'true');
    rec.region.hidden = false;
    expandedSeq = si;
    setSequenceCamera(si);
    if (!opts.noScroll) rec.header.scrollIntoView({ block: 'nearest', behavior: reduceMotion ? 'auto' : 'smooth' });
  }

  function toggleSequence(si, opts) {
    var rec = seqEls[si];
    var isOpen = rec.header.getAttribute('aria-expanded') === 'true';
    if (isOpen) collapseSequence(si);
    else openSequence(si, opts);
  }

  function collapseSequence(si) {
    var rec = seqEls[si];
    rec.header.setAttribute('aria-expanded', 'false');
    rec.region.hidden = true;
    if (expandedSeq === si) expandedSeq = null;
  }

  // ---------------------------------------------------------------
  // Memory detail
  // ---------------------------------------------------------------
  var detail = document.getElementById('detail');
  var detailEyebrow = document.getElementById('detailEyebrow');
  var detailMnum = document.getElementById('detailMnum');
  var detailName = document.getElementById('detailName');
  var detailLoc = document.getElementById('detailLoc');
  var detailDesc = document.getElementById('detailDesc');
  var detailSeal = document.getElementById('detailSeal');
  var lastMemTrigger = null;
  var activeMemEl = null;

  function selectMemory(si, mi) {
    var seq = SEQUENCES[si];
    var mem = seq.memories[mi];
    lastMemTrigger = seqEls[si].mems[mi].el;

    if (activeMemEl) activeMemEl.classList.remove('active');
    activeMemEl = lastMemTrigger;
    activeMemEl.classList.add('active');

    // make sure the containing sequence is open & camera aligned
    if (expandedSeq !== si) {
      if (expandedSeq !== null) collapseSequence(expandedSeq);
      seqEls[si].header.setAttribute('aria-expanded', 'true');
      seqEls[si].region.hidden = false;
      expandedSeq = si;
    }
    setSequenceCamera(si);

    detailSeal.innerHTML = seqSeal(seq.n);
    detailEyebrow.textContent = 'SEQUENCE ' + seq.n;
    detailMnum.textContent = 'MEMORY ' + mem.n;
    detailName.textContent = mem.title;
    detailLoc.textContent = mem.location + ', ' + mem.year;
    detailDesc.textContent = mem.desc;
    detail.classList.add('show');
    detail.setAttribute('aria-hidden', 'false');
    document.getElementById('detailBack').focus();
  }

  function closeDetail(returnFocus) {
    if (!detail.classList.contains('show')) return false;
    detail.classList.remove('show');
    detail.setAttribute('aria-hidden', 'true');
    if (activeMemEl) { activeMemEl.classList.remove('active'); }
    if (returnFocus && lastMemTrigger) lastMemTrigger.focus();
    activeMemEl = null;
    return true;
  }
  document.getElementById('detailBack').addEventListener('click', function () { closeDetail(true); });

  // ---------------------------------------------------------------
  // Search / filter
  // ---------------------------------------------------------------
  var searchInput = document.getElementById('search');
  var searchCount = document.getElementById('searchCount');
  var clearBtn = document.getElementById('clearBtn');
  var emptyState = document.getElementById('emptyState');

  function highlight(el, text, q) {
    if (!q) { el.textContent = text; return; }
    var lower = text.toLowerCase();
    var idx = lower.indexOf(q);
    if (idx < 0) { el.textContent = text; return; }
    el.innerHTML = '';
    var before = document.createTextNode(text.slice(0, idx));
    var mk = document.createElement('mark');
    mk.textContent = text.slice(idx, idx + q.length);
    var after = document.createTextNode(text.slice(idx + q.length));
    el.appendChild(before); el.appendChild(mk); el.appendChild(after);
  }

  function applyFilter() {
    var q = searchInput.value.trim().toLowerCase();
    clearBtn.classList.toggle('show', q.length > 0);

    if (!q) {
      // reset
      seqEls.forEach(function (rec, si) {
        rec.wrap.classList.remove('hidden');
        rec.titleEl.textContent = rec.seq.title;
        rec.mems.forEach(function (m) {
          m.el.classList.remove('hidden');
          m.titleEl.textContent = m.mem.title;
          m.locEl.textContent = m.mem.location;
        });
        if (si !== expandedSeq) collapseSequence(si);
      });
      searchCount.textContent = SEG_COUNT + ' sequences, ' + TOTAL_MEMORIES + ' memories';
      emptyState.classList.remove('show');
      return;
    }

    var seqMatches = 0, memMatches = 0;
    seqEls.forEach(function (rec, si) {
      var seq = rec.seq;
      var titleHit = seq.title.toLowerCase().indexOf(q) >= 0 ||
                     ('sequence ' + seq.n).indexOf(q) >= 0;
      var anyMemHit = false;
      rec.mems.forEach(function (m) {
        var mem = m.mem;
        var hit = mem.title.toLowerCase().indexOf(q) >= 0 ||
                  mem.location.toLowerCase().indexOf(q) >= 0 ||
                  mem.desc.toLowerCase().indexOf(q) >= 0 ||
                  String(mem.year).indexOf(q) >= 0;
        // when the sequence title matches, show all its memories
        var show = hit || titleHit;
        m.el.classList.toggle('hidden', !show);
        highlight(m.titleEl, mem.title, q);
        highlight(m.locEl, mem.location, q);
        if (hit) { anyMemHit = true; memMatches++; }
      });

      var seqVisible = titleHit || anyMemHit;
      rec.wrap.classList.toggle('hidden', !seqVisible);
      highlight(rec.titleEl, seq.title, q);

      if (seqVisible) {
        seqMatches++;
        // auto-expand matching sequences
        rec.header.setAttribute('aria-expanded', 'true');
        rec.region.hidden = false;
      } else {
        rec.header.setAttribute('aria-expanded', 'false');
        rec.region.hidden = true;
      }
    });

    // filtering breaks the single-open invariant intentionally; clear tracker
    expandedSeq = null;

    searchCount.textContent = (seqMatches + memMatches === 0)
      ? 'No matches'
      : seqMatches + (seqMatches === 1 ? ' sequence' : ' sequences') + ', ' +
        memMatches + (memMatches === 1 ? ' memory' : ' memories');
    emptyState.classList.toggle('show', seqMatches === 0);
  }

  searchInput.addEventListener('input', applyFilter);
  clearBtn.addEventListener('click', function () {
    searchInput.value = '';
    applyFilter();
    searchInput.focus();
  });

  // ---------------------------------------------------------------
  // Keyboard: arrow navigation among visible headers + memory rows
  // ---------------------------------------------------------------
  function visibleFocusables() {
    var out = [];
    seqEls.forEach(function (rec) {
      if (rec.wrap.classList.contains('hidden')) return;
      out.push(rec.header);
      if (!rec.region.hidden) {
        rec.mems.forEach(function (m) {
          if (!m.el.classList.contains('hidden')) out.push(m.el);
        });
      }
    });
    return out;
  }

  seqList.addEventListener('keydown', function (e) {
    if (e.key !== 'ArrowDown' && e.key !== 'ArrowUp' && e.key !== 'Home' && e.key !== 'End') return;
    var items = visibleFocusables();
    if (!items.length) return;
    var idx = items.indexOf(document.activeElement);
    var next;
    if (e.key === 'ArrowDown') next = idx < 0 ? 0 : Math.min(items.length - 1, idx + 1);
    else if (e.key === 'ArrowUp') next = idx < 0 ? 0 : Math.max(0, idx - 1);
    else if (e.key === 'Home') next = 0;
    else next = items.length - 1;
    e.preventDefault();
    items[next].focus();
  });

  // ---------------------------------------------------------------
  // Global keyboard: "/" focus search, Esc cascade
  // ---------------------------------------------------------------
  function isTextField(el) {
    return el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA' || el.isContentEditable);
  }

  document.addEventListener('keydown', function (e) {
    if (e.key === '/' && !isTextField(document.activeElement)) {
      e.preventDefault();
      setPanelCollapsed(false);
      searchInput.focus();
      searchInput.select();
      return;
    }
    if (e.key === 'Escape') {
      // 1) close detail
      if (closeDetail(true)) { e.preventDefault(); return; }
      // 2) if focused in search & has text -> clear
      if (document.activeElement === searchInput && searchInput.value) {
        searchInput.value = ''; applyFilter(); e.preventDefault(); return;
      }
      // 3) collapse expanded sequence
      if (expandedSeq !== null) {
        var toFocus = seqEls[expandedSeq].header;
        collapseSequence(expandedSeq);
        toFocus.focus();
        e.preventDefault(); return;
      }
      // 4) clear any search text
      if (searchInput.value) {
        searchInput.value = ''; applyFilter();
        searchInput.focus();
        e.preventDefault(); return;
      }
      // 5) back out entirely to the full-bleed spire
      if (!panelCollapsed) {
        setPanelCollapsed(true);
        panelHandle.focus();
        e.preventDefault(); return;
      }
    }
  });

  // ---------------------------------------------------------------
  // Scroll drives the camera along the spire. Listens on the whole
  // window (not just the canvas) so it works no matter where the
  // pointer sits, but yields to native scrolling inside the list/detail
  // card. Normalizes deltaMode (pixel vs. line vs. page) since trackpads,
  // mice, and browsers report wildly different magnitudes.
  // ---------------------------------------------------------------
  function normalizedDeltaY(e) {
    var scale = e.deltaMode === 1 ? 18 : (e.deltaMode === 2 ? 800 : 1);
    return e.deltaY * scale;
  }

  function setCameraT(t, opts) {
    cameraT = Math.max(0, Math.min(1, t));
    spire.setCamera(cameraT);
    syncRail();
    if (!(opts && opts.keepFocus)) {
      // scrolling freely moves the camera without forcing a specific
      // segment "active" — but keep the label/marker following whatever
      // segment the camera is currently nearest, so the readout never
      // goes stale mid-scroll.
      var nearest = Math.round(cameraT * (SEG_COUNT - 1));
      if (nearest !== focusSeq) { focusSeq = nearest; spire.setActiveSegment(nearest); updateAnnotation(nearest); }
    }
  }

  window.addEventListener('wheel', function (e) {
    if (e.target.closest && (e.target.closest('.seqlist') || e.target.closest('.detail__card'))) return;
    e.preventDefault();
    setCameraT(cameraT + normalizedDeltaY(e) * 0.0011);
  }, { passive: false });

  // ---------------------------------------------------------------
  // Click/hover directly on a disc in the spire — the tiles themselves
  // are hit-testable, not just the sidebar list.
  // ---------------------------------------------------------------
  var hoverSeg = null;
  canvas.addEventListener('mousemove', function (e) {
    var seg = spire.pickSegmentAt(e.clientX, e.clientY);
    if (seg !== hoverSeg) {
      hoverSeg = seg;
      canvas.style.cursor = seg !== null ? 'pointer' : '';
    }
  });
  canvas.addEventListener('mouseleave', function () { hoverSeg = null; canvas.style.cursor = ''; });
  canvas.addEventListener('click', function (e) {
    var seg = spire.pickSegmentAt(e.clientX, e.clientY);
    if (seg === null) return;
    setPanelCollapsed(false);
    openSequence(seg);
    seqEls[seg].header.focus();
  });

  // ---------------------------------------------------------------
  // Scrub rail: draggable + clickable + keyboard-operable position
  // control, and the visible proof that scrolling is registering.
  // ---------------------------------------------------------------
  var scrubRail = document.getElementById('scrubRail');
  var scrubFill = document.getElementById('scrubFill');
  var scrubThumb = document.getElementById('scrubThumb');

  function syncRail() {
    var pct = cameraT * 100;
    scrubFill.style.height = pct + '%';
    scrubThumb.style.top = (100 - pct) + '%';
    scrubRail.setAttribute('aria-valuenow', String(Math.round(pct)));
  }

  function railTFromEvent(e) {
    var rect = scrubRail.getBoundingClientRect();
    var y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
    return 1 - Math.max(0, Math.min(1, y / rect.height));
  }

  var railDragging = false;
  scrubRail.addEventListener('pointerdown', function (e) {
    railDragging = true;
    scrubRail.setPointerCapture(e.pointerId);
    setCameraT(railTFromEvent(e));
  });
  scrubRail.addEventListener('pointermove', function (e) {
    if (!railDragging) return;
    setCameraT(railTFromEvent(e));
  });
  scrubRail.addEventListener('pointerup', function () { railDragging = false; });
  scrubRail.addEventListener('keydown', function (e) {
    if (e.key === 'ArrowUp' || e.key === 'ArrowRight') { setCameraT(cameraT + 0.04); e.preventDefault(); }
    else if (e.key === 'ArrowDown' || e.key === 'ArrowLeft') { setCameraT(cameraT - 0.04); e.preventDefault(); }
    else if (e.key === 'Home') { setCameraT(0); e.preventDefault(); }
    else if (e.key === 'End') { setCameraT(1); e.preventDefault(); }
  });

  // ---------------------------------------------------------------
  // Floating diamond marker + year annotation
  // ---------------------------------------------------------------
  var marker = document.getElementById('marker');
  var annotation = document.getElementById('annotation');

  function updateAnnotation(si) {
    if (si === null || si === undefined) { annotation.style.opacity = '0'; return; }
    var seq = SEQUENCES[si];
    annotation.textContent = seq.year + ' · ' + DATA.subject;
  }

  var markerRAF = null;
  function markerLoop() {
    var si = focusSeq;
    if (si === null || si === undefined) {
      marker.style.opacity = '0';
      annotation.style.opacity = '0';
    } else {
      var pos = spire.getSegmentScreenPos(si);
      if (pos.visible) {
        marker.style.opacity = '1';
        marker.style.left = pos.x + 'px';
        marker.style.top = (pos.y - 44) + 'px';
        annotation.style.opacity = '1';
        annotation.style.left = (pos.x + 16) + 'px';
        annotation.style.top = (pos.y - 6) + 'px';
      } else {
        marker.style.opacity = '0';
        annotation.style.opacity = '0';
      }
    }
    markerRAF = requestAnimationFrame(markerLoop);
  }
  markerRAF = requestAnimationFrame(markerLoop);

  // ---------------------------------------------------------------
  // Theme toggle
  // ---------------------------------------------------------------
  var themeToggle = document.getElementById('themeToggle');
  var osDark = window.matchMedia('(prefers-color-scheme: dark)');
  var manualTheme = null; // null = follow OS

  function effectiveTheme() {
    if (manualTheme) return manualTheme;
    return osDark.matches ? 'dark' : 'light';
  }
  function applyTheme() {
    var t = effectiveTheme();
    if (manualTheme) document.documentElement.setAttribute('data-theme', manualTheme);
    else document.documentElement.removeAttribute('data-theme');
    spire.setTheme(CANVAS_THEME[t]);
    var isDark = t === 'dark';
    themeToggle.textContent = isDark ? 'LIGHT' : 'DARK';
    themeToggle.setAttribute('aria-pressed', String(isDark));
    themeToggle.setAttribute('aria-label', isDark ? 'Switch to light theme' : 'Switch to dark theme');
  }
  themeToggle.addEventListener('click', function () {
    manualTheme = (effectiveTheme() === 'dark') ? 'light' : 'dark';
    applyTheme();
  });
  osDark.addEventListener('change', function () { if (!manualTheme) applyTheme(); });
  applyTheme();

  // ---------------------------------------------------------------
  // Panel collapse: the spire is the hero by default (full-bleed, like
  // the AC reference); the browser panel is a drawer, not a fixture.
  // One state, driven from either the desktop side handle or the
  // mobile corner button.
  // ---------------------------------------------------------------
  var panel = document.getElementById('panel');
  var panelHandle = document.getElementById('panelHandle');
  var panelHandleMobile = document.getElementById('panelHandleMobile');
  var panelCollapsed = true;

  function setPanelCollapsed(collapsed) {
    panelCollapsed = collapsed;
    document.documentElement.classList.toggle('panel-collapsed', collapsed);
    panelHandle.setAttribute('aria-expanded', String(!collapsed));
    panelHandleMobile.setAttribute('aria-expanded', String(!collapsed));
    panelHandleMobile.textContent = collapsed ? 'MENU' : 'CLOSE';
  }
  function togglePanel() { setPanelCollapsed(!panelCollapsed); }
  panelHandle.addEventListener('click', togglePanel);
  panelHandleMobile.addEventListener('click', togglePanel);

  // ---------------------------------------------------------------
  // Resize
  // ---------------------------------------------------------------
  var resizeRAF = null;
  window.addEventListener('resize', function () {
    if (resizeRAF) cancelAnimationFrame(resizeRAF);
    resizeRAF = requestAnimationFrame(function () { spire.resize(); });
  });

  // initial state: spire full-bleed with sequence 1 already highlighted
  // (matching the reference, which always shows a "current" memory), panel
  // collapsed until the visitor asks for the list.
  setPanelCollapsed(true);
  setSequenceCamera(0);
  syncRail();
  spire.resize();
})();
</script>
</body>
</html>
